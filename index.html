<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cronograma del Día</title>
  <style>
    /* ── Reset & Base ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0f1117;
      --surface:     #1a1d27;
      --surface2:    #222535;
      --border:      #2e3249;
      --text:        #e8eaf6;
      --text-muted:  #7b82a8;
      --tooltip-bg:   #0a0c13;
      --tooltip-text: #e8eaf6;
      --accent:      #6c63ff;
      --accent-soft: rgba(108,99,255,.15);
      --danger:      #ff4d6d;
      --warn:        #f59e0b;
      --warn-soft:   rgba(245,158,11,.12);
      --warn-border: rgba(245,158,11,.3);
      --warn-text:   #fbbf24;
      --radius:      12px;
      --radius-sm:   8px;
      --shadow:      0 4px 24px rgba(0,0,0,.45);
      --transition:  .18s ease;
    }

    [data-theme="light"] {
      --bg:          #f2f3f8;
      --surface:     #ffffff;
      --surface2:    #ebedf5;
      --border:      #d4d8ee;
      --text:        #15172b;
      --text-muted:  #6b6f8e;
      --tooltip-bg:   #1a1d27;
      --tooltip-text: #e8eaf6;
      --accent:      #6c63ff;
      --accent-soft: rgba(108,99,255,.12);
      --danger:      #e8344a;
      --warn:        #d97706;
      --warn-soft:   rgba(217,119,6,.1);
      --warn-border: rgba(217,119,6,.35);
      --warn-text:   #92400e;
      --shadow:      0 4px 24px rgba(0,0,0,.1);
    }

    html {
      font-size: 16px;
      transition: background var(--transition), color var(--transition);
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
      transition: background var(--transition), color var(--transition);
    }

    /* ── Theme toggle button ──────────────────────────────────── */
    .btn-theme {
      position: fixed;
      top: 1.25rem;
      right: 1.25rem;
      z-index: 100;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-muted);
      cursor: pointer;
      display: grid;
      place-items: center;
      box-shadow: var(--shadow);
      transition: background var(--transition), border-color var(--transition),
                  color var(--transition), transform var(--transition), box-shadow var(--transition);
    }

    .btn-theme:hover {
      color: var(--accent);
      border-color: var(--accent);
      transform: rotate(20deg) scale(1.08);
    }

    .btn-theme svg { display: block; pointer-events: none; }

    .icon-moon { display: block; }
    .icon-sun  { display: none; }
    [data-theme="light"] .icon-moon { display: none; }
    [data-theme="light"] .icon-sun  { display: block; }

    /* ── Layout ───────────────────────────────────────────────── */
    .app {
      max-width: 780px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    /* ── Header ───────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .header-icon {
      width: 44px;
      height: 44px;
      background: var(--accent);
      border-radius: var(--radius-sm);
      display: grid;
      place-items: center;
      font-size: 1.3rem;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -.02em;
    }

    header p {
      font-size: .85rem;
      color: var(--text-muted);
      margin-top: .15rem;
    }

    .header-progress {
      font-size: .84rem;
      color: var(--accent);
      font-weight: 600;
      margin-top: .4rem;
      font-variant-numeric: tabular-nums;
      line-height: 1.35;
      letter-spacing: .01em;
    }

    .header-progress.is-complete {
      color: var(--accent);
      font-weight: 700;
      text-shadow: 0 0 24px var(--accent-soft);
    }

    /* ── Tasks panel progress bar ─────────────────────────────── */
    .tasks-progress-block {
      margin: -0.35rem 0 1.15rem;
    }

    .tasks-progress-track {
      height: 6px;
      background: var(--surface2);
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .tasks-progress-fill {
      height: 100%;
      width: 0%;
      background: var(--accent);
      border-radius: 999px;
      transition: width .35s ease;
    }

    .tasks-progress-block.is-complete .tasks-progress-fill {
      filter: brightness(1.12);
    }

    /* ── Card Surface ─────────────────────────────────────────── */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
    }

    .panel-title {
      font-size: .72rem;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 1.25rem;
    }

    /* ── Form ─────────────────────────────────────────────────── */
    .form-row {
      display: grid;
      grid-template-columns: 1fr auto auto auto;
      gap: .75rem;
      align-items: end;
    }

    @media (max-width: 560px) {
      .form-row {
        grid-template-columns: 1fr 1fr;
      }
      .form-row .input-group:first-child { grid-column: 1 / -1; }
      .form-row button { grid-column: 1 / -1; }
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: .4rem;
    }

    .input-group label {
      font-size: .75rem;
      font-weight: 500;
      color: var(--text-muted);
      padding-left: .1rem;
    }

    .input-group input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: .9rem;
      padding: .6rem .85rem;
      outline: none;
      width: 100%;
      transition: border-color var(--transition), box-shadow var(--transition);
      font-family: inherit;
    }

    .input-group input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    .input-group input[type="time"] {
      width: 130px;
    }

    .input-group input.invalid {
      border-color: var(--danger);
      box-shadow: 0 0 0 3px rgba(255,77,109,.15);
    }

    .btn-add {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-size: .9rem;
      font-weight: 600;
      padding: .62rem 1.4rem;
      cursor: pointer;
      transition: filter var(--transition), transform var(--transition);
      white-space: nowrap;
      font-family: inherit;
      align-self: end;
    }

    .btn-add:hover { filter: brightness(1.15); transform: translateY(-1px); }
    .btn-add:active { transform: translateY(0); filter: brightness(.95); }

    .form-error {
      font-size: .78rem;
      color: var(--danger);
      min-height: 1.1em;
      margin-top: .5rem;
      padding-left: .1rem;
    }

    .form-warning {
      display: none;
      font-size: .8rem;
      background: var(--warn-soft);
      border: 1px solid var(--warn-border);
      color: var(--warn-text);
      border-radius: var(--radius-sm);
      padding: .6rem .9rem;
      margin-top: .6rem;
      line-height: 1.55;
    }

    .form-warning.visible { display: block; }

    .form-warning strong { font-weight: 700; }

    .btn-add.confirming {
      background: var(--warn);
    }

    /* ── Color swatches ───────────────────────────────────────── */
    .color-picker-row {
      display: flex;
      align-items: center;
      gap: .85rem;
      margin-top: .85rem;
    }

    .color-picker-label {
      font-size: .75rem;
      font-weight: 500;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .color-swatches {
      display: flex;
      gap: .5rem;
      flex-wrap: wrap;
    }

    .swatch {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      padding: 0;
      transition: transform var(--transition), box-shadow var(--transition);
      outline: none;
      flex-shrink: 0;
    }

    .swatch:hover { transform: scale(1.2); }

    .swatch.selected {
      box-shadow: 0 0 0 2.5px var(--bg), 0 0 0 4.5px var(--text);
    }

    /* ── Timeline bar ─────────────────────────────────────────── */
    .timeline-wrapper {
      position: relative;
    }

    .timeline-hours {
      display: flex;
      justify-content: space-between;
      margin-bottom: .4rem;
    }

    .timeline-hours span {
      font-size: .65rem;
      color: var(--text-muted);
      width: 28px;
      text-align: center;
    }

    .timeline-track {
      position: relative;
      height: 48px;
      background: var(--surface2);
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      overflow: visible;
    }

    /* vertical hour grid lines */
    .timeline-track::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: var(--radius-sm);
      background-image: repeating-linear-gradient(
        to right,
        var(--border) 0,
        var(--border) 1px,
        transparent 1px,
        transparent calc(100% / 24)
      );
      pointer-events: none;
    }

    .timeline-block {
      position: absolute;
      top: 4px;
      height: calc(100% - 8px);
      border-radius: 5px;
      cursor: pointer;
      transition: filter var(--transition), transform var(--transition);
      min-width: 4px;
    }

    .timeline-block:hover {
      filter: brightness(1.2);
      transform: scaleY(1.06);
    }

    /* Tooltip */
    .timeline-block::after {
      content: attr(data-tooltip);
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      background: var(--tooltip-bg);
      border: 1px solid var(--border);
      color: var(--tooltip-text);
      font-size: .75rem;
      white-space: nowrap;
      padding: .35rem .65rem;
      border-radius: 6px;
      pointer-events: none;
      opacity: 0;
      transition: opacity var(--transition);
      z-index: 10;
      box-shadow: var(--shadow);
    }

    .timeline-block:hover::after { opacity: 1; }

    /* current time indicator */
    .time-indicator {
      position: absolute;
      top: -4px;
      bottom: -4px;
      width: 2px;
      background: var(--danger);
      border-radius: 2px;
      pointer-events: none;
      z-index: 5;
    }

    .time-indicator::before {
      content: '';
      position: absolute;
      top: 4px;
      left: 50%;
      transform: translateX(-50%);
      width: 8px;
      height: 8px;
      background: var(--danger);
      border-radius: 50%;
    }

    /* ── Empty state ──────────────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 2.5rem 1rem;
      color: var(--text-muted);
    }

    .empty-state .empty-icon {
      font-size: 2.5rem;
      margin-bottom: .75rem;
      display: block;
    }

    .empty-state p {
      font-size: .9rem;
    }

    /* ── Task Cards ───────────────────────────────────────────── */
    .cards-list {
      display: flex;
      flex-direction: column;
      gap: .75rem;
    }

    .task-card {
      display: flex;
      align-items: center;
      gap: 1rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: .85rem 1rem;
      transition: border-color var(--transition), transform var(--transition);
      animation: slideIn .22s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .task-card:hover {
      border-color: var(--accent);
      transform: translateX(2px);
    }

    .task-card.completed {
      opacity: .72;
    }

    .task-card.completed .task-name,
    .task-card.completed .task-meta {
      text-decoration: line-through;
      color: var(--text-muted);
    }

    .task-card.completed .task-duration {
      opacity: .85;
    }

    .timeline-block--completed {
      opacity: 0.45;
    }

    .task-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .task-info {
      flex: 1;
      min-width: 0;
    }

    .task-name {
      font-size: 1rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .task-meta {
      font-size: .8rem;
      color: var(--text-muted);
      margin-top: .2rem;
    }

    .task-duration {
      font-size: .8rem;
      font-weight: 600;
      color: var(--text-muted);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: .2rem .65rem;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .btn-delete {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: .3rem;
      border-radius: 6px;
      line-height: 1;
      font-size: 1rem;
      transition: color var(--transition), background var(--transition);
      flex-shrink: 0;
    }

    .btn-delete:hover {
      color: var(--danger);
      background: rgba(255,77,109,.1);
    }

    .btn-edit {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: .3rem;
      border-radius: 6px;
      line-height: 1;
      font-size: .9rem;
      transition: color var(--transition), background var(--transition);
      flex-shrink: 0;
    }

    .btn-edit:hover {
      color: var(--accent);
      background: var(--accent-soft);
    }

    .btn-complete {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: .3rem;
      border-radius: 6px;
      line-height: 1;
      font-size: .9rem;
      transition: color var(--transition), background var(--transition);
      flex-shrink: 0;
    }

    .btn-complete:hover {
      color: var(--accent);
      background: var(--accent-soft);
    }

    .btn-complete[aria-pressed="true"] {
      color: var(--accent);
      background: var(--accent-soft);
    }

    /* ── Edit mode ────────────────────────────────────────────── */
    .panel.editing {
      border-color: var(--accent);
    }

    .edit-notice {
      display: none;
      align-items: center;
      gap: .6rem;
      font-size: .78rem;
      color: var(--accent);
      margin-top: .55rem;
    }

    .edit-notice.visible { display: flex; }

    .btn-cancel-edit {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: .78rem;
      cursor: pointer;
      text-decoration: underline;
      padding: 0;
      font-family: inherit;
      transition: color var(--transition);
    }

    .btn-cancel-edit:hover { color: var(--text); }

    /* ── Scrollbar ────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

  <!-- Theme toggle -->
  <button class="btn-theme" id="btn-theme" title="Cambiar tema" aria-label="Cambiar tema">
    <!-- Moon: shown in dark mode -->
    <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
    <!-- Sun: shown in light mode -->
    <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="5"/>
      <line x1="12" y1="1"  x2="12" y2="3"/>
      <line x1="12" y1="21" x2="12" y2="23"/>
      <line x1="4.22" y1="4.22"  x2="5.64" y2="5.64"/>
      <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
      <line x1="1"  y1="12" x2="3"  y2="12"/>
      <line x1="21" y1="12" x2="23" y2="12"/>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
      <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
    </svg>
  </button>

  <div class="app">

    <!-- Header -->
    <header>
      <div class="header-icon">🗓</div>
      <div>
        <h1>Cronograma del día</h1>
        <p id="today-label"></p>
        <p class="header-progress" id="header-progress" role="status" aria-live="polite"></p>
      </div>
    </header>

    <!-- Add Task Form -->
    <section class="panel" id="form-panel" aria-label="Agregar tarea">
      <p class="panel-title">Nueva tarea</p>
      <div class="form-row">
        <div class="input-group">
          <label for="task-name">Nombre de la tarea</label>
          <input type="text" id="task-name" placeholder="Ej. Reunión de equipo" autocomplete="off" />
        </div>
        <div class="input-group">
          <label for="task-start">Inicio</label>
          <input type="time" id="task-start" />
        </div>
        <div class="input-group">
          <label for="task-end">Fin</label>
          <input type="time" id="task-end" />
        </div>
        <button class="btn-add" id="btn-add" type="button">+ Agregar</button>
      </div>
      <div class="color-picker-row">
        <span class="color-picker-label">Color</span>
        <div class="color-swatches" id="color-swatches"></div>
      </div>
      <p class="form-error" id="form-error" role="alert" aria-live="polite"></p>
      <div class="form-warning" id="form-warning" role="alert" aria-live="polite"></div>
      <div class="edit-notice" id="edit-notice">
        <span id="edit-notice-text"></span>
        <button class="btn-cancel-edit" id="btn-cancel-edit" type="button">Cancelar edición</button>
      </div>
    </section>

    <!-- Timeline -->
    <section class="panel" aria-label="Vista de línea de tiempo">
      <p class="panel-title">Línea de tiempo — <span id="task-count">0 tareas</span></p>
      <div class="timeline-wrapper">
        <div class="timeline-hours" id="timeline-hours"></div>
        <div class="timeline-track" id="timeline-track">
          <div class="time-indicator" id="time-indicator"></div>
        </div>
      </div>
    </section>

    <!-- Task Cards -->
    <section class="panel" aria-label="Lista de tareas">
      <p class="panel-title">Tareas del día</p>
      <div class="tasks-progress-block" id="tasks-progress-block">
        <div class="tasks-progress-track" id="tasks-progress-track" role="progressbar"
             aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" aria-label="Progreso del día">
          <div class="tasks-progress-fill" id="tasks-progress-fill"></div>
        </div>
      </div>
      <div id="cards-container"></div>
    </section>

  </div>

  <script>
    /* ── Theme ───────────────────────────────────────────────── */
    const THEME_KEY = 'schedule_theme_v1';
    const htmlEl    = document.documentElement;
    const themeBtn  = document.getElementById('btn-theme');

    function applyTheme(theme) {
      htmlEl.dataset.theme = theme;
      localStorage.setItem(THEME_KEY, theme);
    }

    function toggleTheme() {
      applyTheme(htmlEl.dataset.theme === 'light' ? 'dark' : 'light');
    }

    // Load saved theme, fall back to OS preference
    (function initTheme() {
      const saved = localStorage.getItem(THEME_KEY);
      if (saved) {
        applyTheme(saved);
      } else if (window.matchMedia('(prefers-color-scheme: light)').matches) {
        applyTheme('light');
      }
      // default (dark) needs no attribute — :root already defines dark vars
    })();

    themeBtn.addEventListener('click', toggleTheme);

    /* ── Constants ───────────────────────────────────────────── */
    const STORAGE_KEY = 'schedule_tasks_v1';
    const MINUTES_IN_DAY = 24 * 60;
    const HOUR_LABELS = ['00', '03', '06', '09', '12', '15', '18', '21', '24'];
    const PALETTE = ['#3F51B5','#03A9F4','#009688','#CDDC39','#FF9800','#607D8B','#795548','#E91E63'];

    /* ── State ───────────────────────────────────────────────── */
    let tasks = loadTasks();
    let selectedColor  = PALETTE[0];
    let editingTaskId  = null;

    /* ── DOM refs ────────────────────────────────────────────── */
    const nameInput   = document.getElementById('task-name');
    const startInput  = document.getElementById('task-start');
    const endInput    = document.getElementById('task-end');
    const addBtn      = document.getElementById('btn-add');
    const errorEl     = document.getElementById('form-error');
    const warnEl      = document.getElementById('form-warning');
    const trackEl     = document.getElementById('timeline-track');
    const hoursEl     = document.getElementById('timeline-hours');
    const cardsEl     = document.getElementById('cards-container');
    const countEl     = document.getElementById('task-count');
    const todayEl     = document.getElementById('today-label');
    const indicatorEl    = document.getElementById('time-indicator');
    const formPanelEl    = document.getElementById('form-panel');
    const panelTitleEl   = formPanelEl.querySelector('.panel-title');
    const editNoticeEl   = document.getElementById('edit-notice');
    const editNoticeText = document.getElementById('edit-notice-text');
    const cancelEditBtn  = document.getElementById('btn-cancel-edit');
    const headerProgressEl   = document.getElementById('header-progress');
    const tasksProgressBlock = document.getElementById('tasks-progress-block');
    const tasksProgressTrack = document.getElementById('tasks-progress-track');
    const tasksProgressFill  = document.getElementById('tasks-progress-fill');

    /* ── Helpers ─────────────────────────────────────────────── */
    function timeToMinutes(t) {
      const [h, m] = t.split(':').map(Number);
      return h * 60 + m;
    }

    function formatDuration(startMin, endMin) {
      const diff = endMin - startMin;
      const h = Math.floor(diff / 60);
      const m = diff % 60;
      if (h === 0) return `${m}m`;
      if (m === 0) return `${h}h`;
      return `${h}h ${m}m`;
    }

    function hashColor(str) {
      let hash = 0;
      for (let i = 0; i < str.length; i++) {
        hash = str.charCodeAt(i) + ((hash << 5) - hash);
      }
      // Restrict to a 80° window centered on #4b4ddb (hue ≈ 241°): 210–290°
      const hue = 210 + (Math.abs(hash) % 80);
      return {
        bg:    `hsl(${hue}, 62%, 58%)`,
        light: `hsl(${hue}, 62%, 75%)`,
        alpha: `hsla(${hue}, 62%, 58%, .18)`,
      };
    }

    // Returns the display color for a task — uses saved color if set (new tasks),
    // falls back to hashColor for tasks created before the palette was introduced.
    function getTaskColor(task) {
      return task.color || hashColor(task.name).bg;
    }

    function uid() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2);
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    /* ── Edit mode ──────────────────────────────────────────── */
    function enterEditMode(id) {
      const task = tasks.find(t => t.id === id);
      if (!task) return;

      editingTaskId = id;
      nameInput.value  = task.name;
      startInput.value = task.start;
      endInput.value   = task.end;
      selectedColor    = task.color || PALETTE[0];

      renderSwatches();
      clearOverlapWarning();
      errorEl.textContent = '';

      formPanelEl.classList.add('editing');
      panelTitleEl.textContent = 'Editar tarea';
      addBtn.textContent = 'Guardar cambios';
      editNoticeText.textContent = `Editando: "${task.name}"`;
      editNoticeEl.classList.add('visible');

      formPanelEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
      nameInput.focus();
    }

    function exitEditMode() {
      editingTaskId = null;
      nameInput.value  = '';
      startInput.value = '';
      endInput.value   = '';
      selectedColor    = PALETTE[0];

      renderSwatches();
      clearOverlapWarning();
      errorEl.textContent = '';
      [nameInput, startInput, endInput].forEach(el => el.classList.remove('invalid'));

      formPanelEl.classList.remove('editing');
      panelTitleEl.textContent = 'Nueva tarea';
      addBtn.textContent = '+ Agregar';
      editNoticeEl.classList.remove('visible');
    }

    /* ── Color swatches ─────────────────────────────────────── */
    const swatchesEl = document.getElementById('color-swatches');

    function renderSwatches() {
      swatchesEl.innerHTML = '';
      PALETTE.forEach(color => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'swatch' + (color === selectedColor ? ' selected' : '');
        btn.style.background = color;
        btn.title = color;
        btn.setAttribute('aria-label', `Color ${color}`);
        btn.addEventListener('click', () => {
          selectedColor = color;
          renderSwatches();
        });
        swatchesEl.appendChild(btn);
      });
    }

    /* ── Overlap detection ───────────────────────────────────── */
    let awaitingOverlapConfirm = false;

    function findOverlaps(start, end) {
      const s = timeToMinutes(start);
      const e = timeToMinutes(end);
      return tasks.filter(t => {
        if (t.completed) return false;
        if (t.id === editingTaskId) return false; // exclude self when editing
        const ts = timeToMinutes(t.start);
        const te = timeToMinutes(t.end);
        return s < te && e > ts;
      });
    }

    function showOverlapWarning(overlaps) {
      const names = overlaps
        .map(t => `<strong>${escapeHtml(t.name)}</strong> (${t.start}–${t.end})`)
        .join(', ');
      const plural = overlaps.length > 1 ? 'tareas' : 'tarea';
      warnEl.innerHTML =
        `⚠ Se empalma con ${overlaps.length} ${plural}: ${names}. ` +
        `Presiona <strong>Guardar de todas formas</strong> si deseas continuar.`;
      warnEl.classList.add('visible');
    }

    function clearOverlapWarning() {
      warnEl.classList.remove('visible');
      warnEl.innerHTML = '';
      awaitingOverlapConfirm = false;
      addBtn.textContent = editingTaskId ? 'Guardar cambios' : '+ Agregar';
      addBtn.classList.remove('confirming');
    }

    /* ── Persistence ─────────────────────────────────────────── */
    function loadTasks() {
      try {
        const raw = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        return raw.map(t => ({ ...t, completed: !!t.completed }));
      } catch { return []; }
    }

    function saveTasks() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
    }

    /* ── Render: header date ─────────────────────────────────── */
    function renderDate() {
      const opts = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
      todayEl.textContent = new Date().toLocaleDateString('es-MX', opts);
    }

    /* ── Render: timeline hour labels ────────────────────────── */
    function renderHourLabels() {
      hoursEl.innerHTML = '';
      HOUR_LABELS.forEach(h => {
        const span = document.createElement('span');
        span.textContent = h === '24' ? '00' : h;
        hoursEl.appendChild(span);
      });
    }

    /* ── Render: current time indicator ─────────────────────── */
    function updateTimeIndicator() {
      const now = new Date();
      const pct = (now.getHours() * 60 + now.getMinutes()) / MINUTES_IN_DAY * 100;
      indicatorEl.style.left = `${pct}%`;
    }

    /* ── Render: timeline blocks ─────────────────────────────── */
    function renderTimeline() {
      trackEl.querySelectorAll('.timeline-block').forEach(el => el.remove());

      tasks.forEach(task => {
        const startMin = timeToMinutes(task.start);
        const endMin   = timeToMinutes(task.end);
        const left  = startMin / MINUTES_IN_DAY * 100;
        const width = (endMin - startMin) / MINUTES_IN_DAY * 100;

        const block = document.createElement('div');
        block.className = 'timeline-block' + (task.completed ? ' timeline-block--completed' : '');
        block.style.left       = `${left}%`;
        block.style.width      = `${Math.max(width, 0.5)}%`;
        block.style.background = getTaskColor(task);
        block.dataset.tooltip  = `${task.completed ? '✓ ' : ''}${task.name}  ${task.start}–${task.end}`;

        trackEl.appendChild(block);
      });
    }

    /* ── Render: task cards ──────────────────────────────────── */
    function renderCards() {
      const sorted = [...tasks].sort((a, b) => {
        const pa = a.completed ? 1 : 0;
        const pb = b.completed ? 1 : 0;
        if (pa !== pb) return pa - pb;
        return timeToMinutes(a.start) - timeToMinutes(b.start);
      });

      countEl.textContent = `${tasks.length} ${tasks.length === 1 ? 'tarea' : 'tareas'}`;

      if (sorted.length === 0) {
        cardsEl.innerHTML = `
          <div class="empty-state">
            <span class="empty-icon">📋</span>
            <p>Aún no hay tareas. Agrega una usando el formulario de arriba.</p>
          </div>`;
        return;
      }

      cardsEl.innerHTML = '';
      const list = document.createElement('div');
      list.className = 'cards-list';

      sorted.forEach(task => {
        const startMin = timeToMinutes(task.start);
        const endMin   = timeToMinutes(task.end);

        const done = !!task.completed;
        const card = document.createElement('div');
        card.className = 'task-card' + (done ? ' completed' : '');
        card.innerHTML = `
          <div class="task-dot" style="background:${getTaskColor(task)}"></div>
          <div class="task-info">
            <div class="task-name">${escapeHtml(task.name)}</div>
            <div class="task-meta">${task.start} – ${task.end}</div>
          </div>
          <span class="task-duration">${formatDuration(startMin, endMin)}</span>
          <button class="btn-complete" type="button" data-id="${task.id}"
                  title="${done ? 'Marcar como pendiente' : 'Marcar como completada'}"
                  aria-label="${done ? 'Marcar como pendiente' : 'Marcar como completada'}: ${escapeHtml(task.name)}"
                  aria-pressed="${done}">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
              <polyline points="22 4 12 14.01 9 11.01"/>
            </svg>
          </button>
          <button class="btn-edit" data-id="${task.id}" title="Editar tarea" aria-label="Editar ${escapeHtml(task.name)}">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
              <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
            </svg>
          </button>
          <button class="btn-delete" data-id="${task.id}" title="Eliminar tarea" aria-label="Eliminar ${escapeHtml(task.name)}">✕</button>
        `;
        list.appendChild(card);
      });

      cardsEl.appendChild(list);

      cardsEl.querySelectorAll('.btn-complete').forEach(btn => {
        btn.addEventListener('click', () => toggleComplete(btn.dataset.id));
      });

      cardsEl.querySelectorAll('.btn-edit').forEach(btn => {
        btn.addEventListener('click', () => enterEditMode(btn.dataset.id));
      });

      cardsEl.querySelectorAll('.btn-delete').forEach(btn => {
        btn.addEventListener('click', () => {
          if (editingTaskId === btn.dataset.id) exitEditMode();
          deleteTask(btn.dataset.id);
        });
      });
    }

    /* ── Progress (header + tasks panel bar) ─────────────────── */
    function updateProgress() {
      const total = tasks.length;
      const done  = tasks.filter(t => t.completed).length;
      const pct   = total ? Math.round((done / total) * 100) : 0;

      if (total === 0) {
        headerProgressEl.textContent =
          'Sin tareas aún — añade una para ver tu progreso.';
        headerProgressEl.classList.remove('is-complete');
        tasksProgressFill.style.width = '0%';
        tasksProgressTrack.setAttribute('aria-valuenow', '0');
        tasksProgressBlock.classList.remove('is-complete');
        return;
      }

      if (pct === 100) {
        headerProgressEl.textContent =
          `100% · ${done}/${total} completadas — ¡día completo!`;
        headerProgressEl.classList.add('is-complete');
        tasksProgressBlock.classList.add('is-complete');
      } else {
        headerProgressEl.textContent = `${pct}% · ${done}/${total} completadas`;
        headerProgressEl.classList.remove('is-complete');
        tasksProgressBlock.classList.remove('is-complete');
      }

      tasksProgressFill.style.width = `${pct}%`;
      tasksProgressTrack.setAttribute('aria-valuenow', String(pct));
    }

    /* ── Full render ─────────────────────────────────────────── */
    function render() {
      renderTimeline();
      renderCards();
      updateProgress();
      updateTimeIndicator();
    }

    /* ── Add task ────────────────────────────────────────────── */
    function addTask() {
      const name  = nameInput.value.trim();
      const start = startInput.value;
      const end   = endInput.value;

      errorEl.textContent = '';
      nameInput.classList.remove('invalid');
      startInput.classList.remove('invalid');
      endInput.classList.remove('invalid');

      if (!name) {
        errorEl.textContent = 'El nombre de la tarea es obligatorio.';
        nameInput.classList.add('invalid');
        nameInput.focus();
        return;
      }
      if (!start) {
        errorEl.textContent = 'Indica la hora de inicio.';
        startInput.classList.add('invalid');
        startInput.focus();
        return;
      }
      if (!end) {
        errorEl.textContent = 'Indica la hora de fin.';
        endInput.classList.add('invalid');
        endInput.focus();
        return;
      }
      if (timeToMinutes(end) <= timeToMinutes(start)) {
        errorEl.textContent = 'La hora de fin debe ser posterior a la de inicio.';
        endInput.classList.add('invalid');
        endInput.focus();
        return;
      }

      // Overlap check — warn on first attempt, save on second
      if (!awaitingOverlapConfirm) {
        const overlaps = findOverlaps(start, end);
        if (overlaps.length > 0) {
          awaitingOverlapConfirm = true;
          showOverlapWarning(overlaps);
          addBtn.textContent = 'Guardar de todas formas';
          addBtn.classList.add('confirming');
          return;
        }
      }

      clearOverlapWarning();

      if (editingTaskId) {
        tasks = tasks.map(t =>
          t.id === editingTaskId
            ? { ...t, name, start, end, color: selectedColor }
            : t
        );
        exitEditMode();
      } else {
        tasks.push({ id: uid(), name, start, end, color: selectedColor, completed: false });
        nameInput.value  = '';
        startInput.value = '';
        endInput.value   = '';
        nameInput.focus();
      }

      saveTasks();
      render();
    }

    /* ── Toggle completed ───────────────────────────────────── */
    function toggleComplete(id) {
      tasks = tasks.map(t =>
        t.id === id ? { ...t, completed: !t.completed } : t
      );
      saveTasks();
      render();
    }

    /* ── Delete task ─────────────────────────────────────────── */
    function deleteTask(id) {
      tasks = tasks.filter(t => t.id !== id);
      saveTasks();
      render();
    }

    /* ── Event listeners ─────────────────────────────────────── */
    addBtn.addEventListener('click', addTask);
    cancelEditBtn.addEventListener('click', exitEditMode);

    nameInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') addTask();
    });

    [nameInput, startInput, endInput].forEach(el => {
      el.addEventListener('input', () => {
        errorEl.textContent = '';
        el.classList.remove('invalid');
        clearOverlapWarning();
      });
    });

    /* ── Init ────────────────────────────────────────────────── */
    renderDate();
    renderHourLabels();
    renderSwatches();
    render();

    setInterval(updateTimeIndicator, 60_000);
  </script>
</body>
</html>
